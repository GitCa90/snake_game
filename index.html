<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Snake</title>
  </head>
  <body>
    <section id="game-mode-container">
      <div class="game-mode"><div class="game-mode-inner">NORMAL</div><div class="star">&#9733;&#9733;&#9733;</div></div>
      <div class="game-mode"><div class="game-mode-inner">HARD</div><div class="star">&#9733;&#9733;&#9733;</div></div>
      <div class="game-mode"><div class="game-mode-inner">EXPERT</div><div class="star">&#9733;&#9733;&#9733;</div></div>
      <div class="game-mode"><div class="game-mode-inner">MASTER</div><div class="star">&#9733;&#9733;&#9733;</div></div>
      <div class="game-mode"><div class="game-mode-inner">INFERNO</div><div class="star">&#9733;&#9733;&#9733;</div></div>
    </section>
    <div id="main-container">
      <div id="playerboard">
        <div id="score"></div>
        <div>
          <img id="special-Icon" />
          <span id="special-countdown"></span>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="canvas" width="600" height="400"></canvas>
        <div class="game-over"></div>
        <div class="game-over-background"></div>
        <p id="game-over-text">YOU DIED</p>
      </div>
      <p id="press-any-key">Press any key to continue...</p>

      <div id="bottom-section">
        <div id="highscore-container">
          <p id="highscore-text">HIGHSCORE</p>
          <div id="date-score-header">
            <span>Date</span>
            <span>Score</span>
            <div class="score-row">
              <span class="date-col">&nbsp;</span>
              <span class="score-col">&nbsp;</span>
            </div>
          </div>
        </div>
        <div id="settings-section">
          <p id="settings-text">SETTINGS</p>

          <div id="difficulty-section">
            <button id="normal-btn" class="difficulty-btn" data-difficulty="Normal">Normal</button>
            <button class="difficulty-btn" data-difficulty="Hard">Hard</button>
            <button class="difficulty-btn" data-difficulty="Expert">Expert</button>
            <button class="difficulty-btn" data-difficulty="Master">Master</button>
            <button class="difficulty-btn" data-difficulty="Inferno">Inferno</button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="main.js"></script>
</html>
