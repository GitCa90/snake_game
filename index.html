<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Snake</title>
  </head>
  <body>
    <div id="main-container">
      <div id="playerboard">
        <div id="score"></div>
        <div id="special-countdown">!!00</div>
      </div>
      <div id="score-line"></div>
      <div id="canvas-wrap">
        <canvas id="canvas" width="600" height="400"></canvas>
        <div class="game-over"></div>
        <div class="game-over-background"></div>
        <p id="game-over-text">YOU DIED</p>
        
      </div>
      <p id="press-any-key">Press any key to continue...</p>

      <div id="bottom-section">
        <div id="highscore-container"><P id="highscore-text">HIGHSCORE</P>
        <div id="date-score-header">
          <span>Date</span>
          <span>Score</span>
          <div class="score-row">
            <span class="date-col">&nbsp;</span>
            <span class="score-col">&nbsp;</span>
          </div>
      </div>
      
      </div>
    <div id="settings-section">
        <p id="settings-text">SETTINGS</p>
       
          <div id="difficulty-section">
            <button id="normal-btn" class="difficulty-btn">Normal</button>
            <button id="hard-btn" class="difficulty-btn">Hard</button>
            <button id="expert-btn" class="difficulty-btn">Expert</button>
           <button id="master-btn" class="difficulty-btn">Master</button>
            <button id="inferno-btn" class="difficulty-btn">Inferno</button>
        </div>
      </div>
      
   </div>

  </body>
  <script src="main.js"></script>
</html>
